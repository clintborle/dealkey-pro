<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealKey Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="settings.css">
</head>
<body>

  <div class="settings-container">

    <!-- Header -->
    <div class="settings-header">
      <span class="settings-header__logo">DealKey</span>
      <p class="settings-header__subtitle">Settings</p>
    </div>

    <!-- License Key -->
    <div class="license-section" id="licenseSection">
      <p class="provider-section__label">License</p>

      <div id="licenseStatusBanner" style="display:none; margin-bottom:12px; padding:10px 14px; border-radius:8px; font-size:0.82rem; font-weight:500; display:flex; align-items:center; gap:8px;"></div>

      <div class="key-input-wrapper" style="margin-bottom:8px;">
        <input type="text" class="key-input" id="licenseKeyInput" placeholder="XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX" autocomplete="off" spellcheck="false" style="font-family: var(--font-mono, 'IBM Plex Mono', monospace); font-size:0.82rem; letter-spacing:0.02em;">
        <button class="key-toggle" id="validateBtn">Validate</button>
      </div>
      <div id="licenseFeedback" style="font-size:0.78rem; min-height:18px; margin-bottom:4px;"></div>

      <div id="upgradeNudge" style="display:none; margin-top:8px; font-size:0.8rem; color:#7A7672;">
        No license? <a href="LEMON_SQUEEZY_CHECKOUT_URL_HERE" target="_blank" rel="noopener" style="color:#6B8F6B; font-weight:500; text-decoration:none;">Get DealKey Pro — $19 →</a>
      </div>
    </div>

    <hr style="border:none; border-top:1px solid rgba(42,40,37,0.08); margin:16px 0;">

    <!-- Provider Selection -->
    <div class="provider-section">
      <p class="provider-section__label">AI Provider</p>
      <div class="provider-cards" id="providerCards">

        <label class="provider-card selected" data-provider="claude">
          <input type="radio" name="provider" value="claude" checked>
          <span class="provider-card__radio"></span>
          <span class="provider-card__icon">C</span>
          <div class="provider-card__info">
            <span class="provider-card__name">Claude <span class="provider-card__badge">Recommended</span></span>
            <p class="provider-card__desc">Best accuracy for finding valid discount codes</p>
          </div>
        </label>

        <label class="provider-card" data-provider="openai">
          <input type="radio" name="provider" value="openai">
          <span class="provider-card__radio"></span>
          <span class="provider-card__icon">O</span>
          <div class="provider-card__info">
            <span class="provider-card__name">OpenAI</span>
            <p class="provider-card__desc">Reliable alternative, works with any OpenAI plan</p>
          </div>
        </label>

        <label class="provider-card" data-provider="openrouter">
          <input type="radio" name="provider" value="openrouter">
          <span class="provider-card__radio"></span>
          <span class="provider-card__icon">R</span>
          <div class="provider-card__info">
            <span class="provider-card__name">OpenRouter</span>
            <p class="provider-card__desc">Access multiple models from a single key</p>
          </div>
        </label>

      </div>
    </div>

    <!-- API Key Input -->
    <div class="key-section">
      <p class="key-section__label">API Key</p>
      <div class="key-input-wrapper">
        <input type="password" class="key-input" id="apiKeyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
        <button class="key-toggle" id="keyToggle">Show</button>
      </div>
    </div>

    <!-- Save -->
    <div class="save-section">
      <button class="btn-save" id="saveBtn">Save settings</button>
      <div class="toast" id="toast"></div>
    </div>

    <!-- Privacy Note -->
    <div class="privacy-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <p class="privacy-note__text">
        <strong>Your key never leaves your browser.</strong>
        It's stored in Chrome's secure local storage. DealKey has no servers, no analytics, and no telemetry. The source code is open on GitHub.
      </p>
    </div>

  </div>

  <script>
    // Provider card selection
    document.querySelectorAll('.provider-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        card.querySelector('input[type="radio"]').checked = true;

        // Update placeholder based on provider
        const provider = card.dataset.provider;
        const input = document.getElementById('apiKeyInput');
        const placeholders = {
          claude: 'sk-ant-...',
          openai: 'sk-...',
          openrouter: 'sk-or-...'
        };
        input.placeholder = placeholders[provider] || 'sk-...';
      });
    });

    // Show/hide toggle
    const keyInput = document.getElementById('apiKeyInput');
    const keyToggle = document.getElementById('keyToggle');
    keyToggle.addEventListener('click', () => {
      const isPassword = keyInput.type === 'password';
      keyInput.type = isPassword ? 'text' : 'password';
      keyToggle.textContent = isPassword ? 'Hide' : 'Show';
    });

    // Save settings
    const saveBtn = document.getElementById('saveBtn');
    const toast = document.getElementById('toast');

    saveBtn.addEventListener('click', () => {
      const provider = document.querySelector('input[name="provider"]:checked').value;
      const apiKey = keyInput.value.trim();

      if (!apiKey) {
        showToast('Please enter an API key', 'error');
        return;
      }

      saveBtn.classList.add('saving');
      saveBtn.textContent = 'Saving...';

      // Save to Chrome storage
      if (typeof chrome !== 'undefined' && chrome.storage) {
        chrome.storage.local.set({ provider, apiKey }, () => {
          onSaveSuccess();
        });
      } else {
        // Fallback for testing outside extension
        localStorage.setItem('dealkey_provider', provider);
        localStorage.setItem('dealkey_apiKey', apiKey);
        setTimeout(onSaveSuccess, 400);
      }
    });

    function onSaveSuccess() {
      saveBtn.classList.remove('saving');
      saveBtn.classList.add('saved');
      saveBtn.textContent = 'Saved';
      showToast('Settings saved successfully', 'success');

      setTimeout(() => {
        saveBtn.classList.remove('saved');
        saveBtn.textContent = 'Save settings';
      }, 2000);
    }

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = 'toast visible ' + type;
      setTimeout(() => {
        toast.classList.remove('visible');
      }, 3000);
    }

    // Load saved settings
    function loadSettings() {
      if (typeof chrome !== 'undefined' && chrome.storage) {
        chrome.storage.local.get(['provider', 'apiKey'], (result) => {
          if (result.provider) {
            const card = document.querySelector(`[data-provider="${result.provider}"]`);
            if (card) {
              document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
              card.classList.add('selected');
              card.querySelector('input[type="radio"]').checked = true;
            }
          }
          if (result.apiKey) {
            keyInput.value = result.apiKey;
          }
        });
      } else {
        const provider = localStorage.getItem('dealkey_provider');
        const apiKey = localStorage.getItem('dealkey_apiKey');
        if (provider) {
          const card = document.querySelector(`[data-provider="${provider}"]`);
          if (card) {
            document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');
            card.querySelector('input[type="radio"]').checked = true;
          }
        }
        if (apiKey) keyInput.value = apiKey;
      }
    }

    loadSettings();

    // ── License validation ──────────────────────────────────────────────────

    const LS_VALIDATE_URL  = 'https://api.lemonsqueezy.com/v1/licenses/validate';
    const LS_INSTANCE_NAME = 'DealKey Chrome';

    const licenseKeyInput  = document.getElementById('licenseKeyInput');
    const validateBtn      = document.getElementById('validateBtn');
    const licenseStatusBanner = document.getElementById('licenseStatusBanner');
    const licenseFeedback  = document.getElementById('licenseFeedback');
    const upgradeNudge     = document.getElementById('upgradeNudge');

    async function validateLicense(key) {
      if (!key || key.trim().length < 10) return { valid: false, error: 'Enter a valid license key.' };

      if (!navigator.onLine) {
        const s = await chrome.storage.local.get(['licenseKey', 'licenseValid']);
        if (s.licenseKey === key.trim() && s.licenseValid) return { valid: true, offline: true };
        return { valid: false, error: 'Offline — connect to validate.' };
      }

      try {
        const res = await fetch(LS_VALIDATE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: key.trim(), instance_name: LS_INSTANCE_NAME })
        });
        const data = await res.json();

        if (res.ok && data.activated) return { valid: true };
        if (res.status === 400 && data.error === 'invalid_instance_id') return { valid: true };
        if (data.error === 'activation_limit_reached') return { valid: false, error: 'Activation limit reached — contact support to reset.' };

        return { valid: false, error: data.message || data.error || 'Invalid license key.' };
      } catch {
        return { valid: false, error: 'Could not reach license server — check your connection.' };
      }
    }

    function showLicenseValid(offline) {
      licenseStatusBanner.style.display = 'flex';
      licenseStatusBanner.style.background = 'rgba(107,143,107,0.12)';
      licenseStatusBanner.style.color = '#3a6b3a';
      licenseStatusBanner.innerHTML = offline
        ? '✓ Pro unlocked (offline — using cached validation)'
        : '✓ Pro unlocked';
      licenseFeedback.textContent = '';
      upgradeNudge.style.display = 'none';
    }

    function showLicenseInvalid(msg) {
      licenseStatusBanner.style.display = 'none';
      licenseFeedback.style.color = '#C4785A';
      licenseFeedback.textContent = msg;
      upgradeNudge.style.display = 'block';
    }

    validateBtn.addEventListener('click', async () => {
      const key = licenseKeyInput.value.trim();
      if (!key) { showLicenseInvalid('Enter your license key first.'); return; }

      validateBtn.disabled = true;
      validateBtn.textContent = 'Checking…';
      licenseFeedback.textContent = '';

      const result = await validateLicense(key);

      if (result.valid) {
        await chrome.storage.local.set({ licenseKey: key, licenseValid: true });
        showLicenseValid(result.offline);
      } else {
        await chrome.storage.local.set({ licenseKey: key, licenseValid: false });
        showLicenseInvalid(result.error);
      }

      validateBtn.disabled = false;
      validateBtn.textContent = 'Validate';
    });

    licenseKeyInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') validateBtn.click();
    });

    // Load saved license state
    if (typeof chrome !== 'undefined' && chrome.storage) {
      chrome.storage.local.get(['licenseKey', 'licenseValid'], (result) => {
        if (result.licenseKey) {
          licenseKeyInput.value = result.licenseKey;
          if (result.licenseValid) {
            showLicenseValid(false);
          } else {
            showLicenseInvalid('Previously saved key is invalid — try re-validating.');
            upgradeNudge.style.display = 'block';
          }
        } else {
          upgradeNudge.style.display = 'block';
        }
      });
    }
  </script>
</body>
</html>
